<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSET 170 Final</title>
    <link rel="stylesheet" href="static/styles/style.css">
</head>
<body>
    <header>
        <h2>Bank</h2>
    </header>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/balance">View Balance</a></li>
            <li><a href="/transfer">Transfers</a></li>
        </ul>
    </nav>
    <main>
        <h1>Transfer Money</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}
        <form action="/transfer" method="POST">
            <label for="to_acc">Recipient Account Number</label>
            <input type="text" id="to_acc" name="to_acc" placeholder="10-digit account number" required>
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" name="amount" min="1" required>
            <input type="submit" value="Send Transfer" class="input_submit">
        </form>
    </main>
    <footer>
        <h2>By Rob Wiley and Michael Whiteley</h2>
    </footer>
</body>
</html>
